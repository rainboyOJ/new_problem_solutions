name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-problems-solution
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image references
        id: image
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_name:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_ref=$image_name:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.sha_ref }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/rbook_deploy_key
          chmod 600 ~/.ssh/rbook_deploy_key

      - name: Trust VPS host key
        run: |
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ghcr_token_b64="$(printf '%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)"
          ssh -i ~/.ssh/rbook_deploy_key \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "APP_DIR='${{ secrets.VPS_APP_DIR }}' SERVICE_NAME='${{ secrets.VPS_SERVICE_NAME }}' BRANCH='${{ github.ref_name }}' IMAGE_REF='${{ steps.image.outputs.image_ref }}' GHCR_USERNAME='${{ github.actor }}' GHCR_TOKEN_B64='$ghcr_token_b64' bash -s" <<'EOF'
          set -euo pipefail
          : "${APP_DIR:=/srv/rbook}"
          : "${SERVICE_NAME:=problems-solution}"
          : "${BRANCH:=master}"
          : "${IMAGE_REF:=ghcr.io/rainboyoj/new_problem_solutions:master}"
          : "${GHCR_USERNAME:=}"
          : "${GHCR_TOKEN_B64:=}"
          export APP_DIR SERVICE_NAME BRANCH IMAGE_REF GHCR_USERNAME GHCR_TOKEN_B64
          cd "$APP_DIR"
          bash scripts/deploy-vps.sh
          EOF
